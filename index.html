<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend Explore | Explore the Beauty of South India</title>
    <meta name="description" content="Discover the best travel destinations in Karnataka, from the hills of Kodagu to the ruins of Hampi. Plan your perfect trip today.">
    <link rel="stylesheet" href="styles.css?v=7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <a href="#" class="navbar-brand" onclick="renderHome()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2.5" class="brand-icon">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#8338EC" />
                            <stop offset="50%" stop-color="#FF007F" />
                            <stop offset="100%" stop-color="#00F0FF" />
                        </linearGradient>
                    </defs>
                    <circle cx="16" cy="9" r="3" fill="url(#logoGrad)" class="logo-sun" />
                    <path d="M3 20L10 8L15 15L18 11L21 20H3Z" stroke="url(#logoGrad)" fill="none" stroke-linejoin="round" stroke-linecap="round" />
                </svg>
                <span class="brand-text-main">Weekend</span><span class="brand-text-sub">Explore</span>
            </a>
            <div class="nav-links">
                <a href="#" class="nav-link active">Explore</a>
                <a href="#" class="nav-link">Trips</a>
                <a href="#" class="nav-link">Deals</a>
                <a href="#" class="nav-link">Experiences</a>
                <a href="#" class="nav-link">Inspiration</a>
                <a href="#" class="nav-link">Support</a>
            </div>
            <div class="nav-actions">
                <div class="nav-icon"><img src="https://api.iconify.design/material-symbols:language.svg" alt="Lang"> EN</div>
                <button class="mute-btn" id="welcome-mute-btn" aria-label="Mute welcome voice" title="Mute/Unmute Welcome Voice">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="speaker-icon">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" class="sound-wave"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" class="sound-wave"></path>
                    </svg>
                </button>
                <div class="nav-icon"><img src="https://api.iconify.design/material-symbols:favorite-outline.svg" alt="Fav"></div>
                <button class="signin-btn">Sign In</button>
            </div>
        </nav>
    </header>

    <main id="app">
        <!-- Content will be injected by scripts.js -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="scripts.js?v=7"></script>
</body>
</html>
